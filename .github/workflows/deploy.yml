name: Deploy TutorLink Lambdas

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install root dependencies and compile TypeScript
        run: |
          npm ci
          npm run build
          npm prune --omit=dev

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambdas
        run: |
          for dir in lambdas/*/; do
            name="$(basename "$dir")"
            if [ "$name" = "shared" ]; then
              echo "Skipping lambdas/shared (not a deployable function)"
              continue
            fi

            FUNCTION_NAME="tutorlink-${name}"
            echo "Deploying $FUNCTION_NAME..."

            if [ "$name" = "auth" ]; then
              for f in signup login refresh; do
                if [ ! -f "dist/auth/${f}.js" ]; then
                  echo "Missing dist/auth/${f}.js — run npm run build locally"
                  exit 1
                fi
              done
              rm -rf .lambda-pack-auth
              mkdir -p .lambda-pack-auth
              cp dist/auth/*.js .lambda-pack-auth/
              cp -R node_modules .lambda-pack-auth/
              (cd .lambda-pack-auth && zip -r ../tutorlink-auth.zip .)
              rm -rf .lambda-pack-auth
              for suffix in signup login refresh; do
                aws lambda update-function-code \
                  --function-name "tutorlink-auth-${suffix}" \
                  --zip-file "fileb://tutorlink-auth.zip"
              done
              rm -f tutorlink-auth.zip
              echo "$FUNCTION_NAME (signup, login, refresh) deployed successfully"
              continue
            fi

            if [ ! -f "dist/${name}/index.js" ]; then
              echo "Missing dist/${name}/index.js — add lambdas/${name}/index.ts and ensure npm run build emits it"
              exit 1
            fi

            (cd "dist/${name}" && zip -r "../../${FUNCTION_NAME}.zip" .)

            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file "fileb://${FUNCTION_NAME}.zip"

            echo "$FUNCTION_NAME deployed successfully"
          done

      - name: Deployment complete
        run: echo "All TutorLink Lambdas deployed successfully!"
