name: Deploy TutorLink Lambdas

env:
  # Until Node 24 is default on runners (June 2026), run JS-based actions on Node 24.
  # See: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install root dependencies and compile TypeScript
        run: |
          npm ci
          npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Lambdas
        run: |
          for dir in lambdas/*/; do
            name="$(basename "$dir")"
            if [ "$name" = "shared" ]; then
              echo "Skipping lambdas/shared (not a deployable function)"
              continue
            fi

            FUNCTION_NAME="tutorlink-${name}"
            echo "Deploying $FUNCTION_NAME..."

            # Auth lambdas import ../shared/http, so package auth/ and shared/ together.
            # Handlers are configured as:
            #   tutorlink-auth-signup   -> auth/signup.handler
            #   tutorlink-auth-login    -> auth/login.handler
            #   tutorlink-auth-refresh  -> auth/refresh.handler
            if [ "$name" = "auth" ]; then
              for f in signup login refresh; do
                if [ ! -f "dist/auth/${f}.js" ]; then
                  echo "Missing dist/auth/${f}.js — run npm run build locally"
                  exit 1
                fi
              done
              if [ ! -f "dist/shared/http.js" ]; then
                echo "Missing dist/shared/http.js — run npm run build locally"
                exit 1
              fi
              rm -rf .lambda-pack-auth
              mkdir -p .lambda-pack-auth/auth .lambda-pack-auth/shared
              cp dist/auth/*.js .lambda-pack-auth/auth/
              cp dist/shared/*.js .lambda-pack-auth/shared/
              cp -R node_modules .lambda-pack-auth/
              (cd .lambda-pack-auth && zip -r ../tutorlink-auth.zip .)
              rm -rf .lambda-pack-auth
              for suffix in signup login refresh; do
                aws lambda update-function-code \
                  --function-name "tutorlink-auth-${suffix}" \
                  --zip-file "fileb://tutorlink-auth.zip"
                aws lambda update-function-configuration \
                  --function-name "tutorlink-auth-${suffix}" \
                  --handler "auth/${suffix}.handler"
              done
              rm -f tutorlink-auth.zip
              echo "$FUNCTION_NAME (signup, login, refresh) deployed successfully"
              continue
            fi

            entry_js_files=(dist/${name}/*.js)
            if [ ! -f "${entry_js_files[0]}" ]; then
              echo "Missing compiled entry for dist/${name}/*.js — ensure lambdas/${name} has one handler .ts file"
              exit 1
            fi
            if [ "${#entry_js_files[@]}" -ne 1 ]; then
              echo "Expected exactly one entry file in dist/${name}, found ${#entry_js_files[@]}"
              exit 1
            fi
            entry_js_path="${entry_js_files[0]}"
            entry_js_name="$(basename "$entry_js_path")"
            entry_module="${entry_js_name%.js}"

            if [ ! -f "dist/shared/http.js" ]; then
              echo "Missing dist/shared/http.js — run npm run build locally"
              exit 1
            fi

            rm -rf ".lambda-pack-${name}"
            mkdir -p ".lambda-pack-${name}/${name}" ".lambda-pack-${name}/shared"
            cp "$entry_js_path" ".lambda-pack-${name}/${name}/${entry_js_name}"
            cp dist/shared/*.js ".lambda-pack-${name}/shared/"
            cp -R node_modules ".lambda-pack-${name}/node_modules"
            (cd ".lambda-pack-${name}" && zip -r "../${FUNCTION_NAME}.zip" .)
            rm -rf ".lambda-pack-${name}"

            aws lambda update-function-code \
              --function-name "$FUNCTION_NAME" \
              --zip-file "fileb://${FUNCTION_NAME}.zip"
            aws lambda update-function-configuration \
              --function-name "$FUNCTION_NAME" \
                  --handler "${name}/${entry_module}.handler"

            echo "$FUNCTION_NAME deployed successfully"
          done

      - name: Deployment complete
        run: echo "All TutorLink Lambdas deployed successfully!"
